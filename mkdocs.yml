site_name: plushie
site_description: Native desktop GUI framework for Python, powered by iced
site_url: https://plushie-ui.github.io/plushie-python
repo_url: https://github.com/plushie-ui/plushie-python
repo_name: plushie-ui/plushie-python

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
  - htmlproofer:
      raise_error: true
      raise_error_excludes:
        404: ["*"]
      validate_external_urls: false

nav:
  - Home: index.md
  - Getting Started:
    - Setup: getting-started.md
    - Tutorial: tutorial.md
  - Guides:
    - App: app.md
    - Layout: layout.md
    - Events: events.md
    - Commands: commands.md
    - Effects: effects.md
    - Theming: theming.md
    - Scoped IDs: scoped-ids.md
    - Composition Patterns: composition-patterns.md
    - Testing: testing.md
    - Accessibility: accessibility.md
    - Extensions: extensions.md
    - Running: running.md
  - Reference:
    - CLI: cli.md
    - Standalone Executables: standalone.md
    - Versioning: versioning.md
